<html lang="zh-CN">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* 银河背景设定 (CSS模拟静态星星) */
        body { 
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; 
            background-color: #05122b;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 1px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 1px);
            background-size: 550px 550px, 350px 350px;
            background-position: 0 0, 40px 60px;
            background-attachment: fixed;
            color: #fff; overflow: hidden; 
        }
        
        /* 开屏动画 */
        #splash {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: inherit; 
            display: flex; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.8s ease;
        }
        #splash h1 { color: #fff; font-size: 42px; font-weight: 900; letter-spacing: 2px; text-align: center; line-height: 1.4; }
        
        #app { position: relative; width: 100vw; height: 100vh; background: transparent; }
        
        /* 顶部导航 */
        header { position: absolute; top: 20px; width: 100%; padding: 0 20px; display: flex; justify-content: space-between; align-items: flex-start; z-index: 10; pointer-events: none; }
        .title-area { display: flex; flex-direction: column; color: #fff; flex-shrink: 0;}
        .logo { font-size: 20px; font-weight: bold; margin-bottom: 2px; }
        .slogan-title { font-size: 12px; opacity: 0.8; white-space: nowrap; overflow: hidden;}
        
        .top-btns { display: flex; flex-direction: column; gap: 10px; align-items: flex-end; pointer-events: auto; }
        .toggle-btn { background: rgba(30, 41, 75, 0.7); border: 1px solid rgba(255,255,255,0.6); color: #fff; padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: bold; backdrop-filter: blur(5px); cursor: pointer; }
        
        #map-container { width: 100%; height: 100%; }
        
        /* 左下角状态 */
        .stats-corner { position: absolute; bottom: 30px; left: 20px; z-index: 10; pointer-events: none; background: rgba(0,0,0,0.5); padding: 10px 15px; border-radius: 12px; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.1); }
        .stats-main { display: flex; align-items: baseline; gap: 5px; }
        .stats-corner .number { font-size: 32px; font-weight: 900; color: #fff; }
        .stats-corner .total { font-size: 16px; color: #ccc; font-weight: bold; }
        .stats-corner .desc { font-size: 14px; color: #ddd; margin-top: 2px; display: flex; justify-content: space-between; gap: 15px;}
        .stats-corner .percent { color: #00bfff; font-weight: bold; }
        
        /* 右下角功能区 */
        .action-icons { position: absolute; bottom: 30px; right: 20px; display: flex; flex-direction: column; gap: 15px; z-index: 10; align-items: flex-end; }
        .icon-btn { display: flex; align-items: center; background: rgba(19, 27, 51, 0.75); border: 1px solid rgba(255,255,255,0.3); border-radius: 30px; padding: 10px 15px; color: #fff; cursor: pointer; backdrop-filter: blur(5px); transition: 0.2s; }
        .icon-btn .icon { font-size: 18px; }
        .icon-btn .text { margin-left: 8px; font-size: 14px; font-weight: bold; color: #fff; }

        /* 底部抽屉式列表 */
        #list-drawer { position: fixed; bottom: -100%; left: 0; width: 100%; height: 80vh; background: rgba(19, 27, 51, 0.95); backdrop-filter: blur(10px); border-radius: 20px 20px 0 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.8); transition: bottom 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); z-index: 100; display: flex; flex-direction: column; border: 1px solid rgba(255,255,255,0.1); border-bottom: none; }
        .drawer-header { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .close-drawer { font-size: 24px; color: #aaa; cursor: pointer; }
        .search-container { padding: 15px 20px; }
        .search-box { width: 100%; padding: 12px 15px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.2); outline: none; background: rgba(0,0,0,0.3); color: #fff; font-size: 14px; }
        .list-content { flex: 1; overflow-y: auto; padding: 0 20px 20px 20px; }
        
        /* 层级列表样式 */
        .list-item-title { flex: 1; text-align: left; font-weight: bold; font-size: 16px; color: #fff; }
        .province-group { margin-bottom: 10px; border-radius: 10px; background: rgba(0,0,0,0.3); overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .province-header { display: flex; justify-content: space-between; align-items: center; padding: 15px; cursor: pointer; }
        .toggle-arrow { font-size: 12px; transition: transform 0.3s; color: #aaa; margin-left: 10px;}
        .toggle-arrow.open { transform: rotate(90deg); }
        
        .city-list { display: none; background: rgba(0,0,0,0.2); }
        .city-list.open { display: block; }
        .city-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px 12px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; color: #ccc; }
        
        /* 五角星 */
        .star-btn { font-size: 20px; cursor: pointer; filter: grayscale(100%); opacity: 0.3; transition: 0.3s; margin-left: 10px; }
        .star-btn.active { filter: grayscale(0%); opacity: 1; text-shadow: 0 0 15px #ffea00; }
        
        #toast { position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); background: #fff; color: #000; padding: 12px 24px; border-radius: 30px; font-weight: bold; opacity: 0; pointer-events: none; z-index: 1000; }
        
        /* 海报预览 */
        #poster { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.95); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #poster-content { width: 100%; border-radius: 15px; overflow: hidden; position: relative; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 0 30px rgba(0,191,255,0.2); }
        
        /* 恢复右上角关闭 X */
        .close-poster { position: absolute; top: 20px; right: 20px; color: #fff; font-size: 36px; cursor: pointer; z-index: 2001; line-height: 1; width: 40px; height: 40px; text-align: center; }
        .save-tip { color: #fff; margin-top: 25px; font-size: 14px; letter-spacing: 1px; }
    </style>
</head>

    <div id="splash"><h1>give the world<br>a hug!</h1></div>

    <div id="app">
        <header>
            <div class="title-area">
                <div class="logo">足迹星球</div>

            </div>
            <div class="top-btns">

        <div id="map-container"></div>

        <div class="stats-corner" id="mainStats">

        </div>

        <div class="action-icons" id="mainActions">
            <div class="icon-btn" onclick="openDrawer()">

                <span class="text" id="starBtnText">点亮省份</span>
            </div>
            <div class="icon-btn" onclick="resetMap()">

                <span class="text">重置地图</span>
            </div>
            <div class="icon-btn" onclick="generatePoster()">
                <span class="icon">📸</span>
                <span class="text">分享足迹</span>
            </div>
        </div>
    </div>

    <div id="list-drawer">
        <div class="drawer-header">
            <h3 id="drawerTitle">选择省份</h3>
            <span class="close-drawer" onclick="closeDrawer()">×</span>
        </div>
        <div class="search-container">
            <input type="text" id="searchInput" class="search-box" placeholder="搜索名称...">
        </div>
        <div class="list-content" id="locationList"></div>
    </div>

    <div id="toast"></div>

    <div id="poster">
        <div class="close-poster" onclick="closePoster()">×</div>
        <div id="poster-content"></div>
        <div class="save-tip">长按上方图片保存至相册</div>

            "西藏":{"拉萨市":[91.11,29.64],"日喀则市":[88.88,29.26],"昌都市":[97.17,31.14],"林芝市":[94.36,29.65],"山南市":[91.76,29.23],"那曲市":[92.06,31.47],"阿里地区":[80.10,32.50]},
            "陕西":{"西安市":[108.94,34.34],"铜川市":[108.93,34.89],"宝鸡市":[107.14,34.36],"咸阳市":[108.70,34.33],"渭南市":[109.50,34.52],"延安市":[109.49,36.58],"汉中市":[107.02,33.07],"榆林市":[109.74,38.29],"安康市":[109.02,32.69],"商洛市":[109.93,33.86]},
            "甘肃":{"兰州市":[103.82,36.05],"嘉峪关市":[98.28,39.77],"金昌市":[102.18,38.52],"白银市":[104.17,36.54],"天水市":[105.72,34.58],"武威市":[102.63,37.92],"张掖市":[100.45,38.92],"平凉市":[106.68,35.54],"酒泉市":[98.50,39.73],"庆阳市":[107.63,35.73],"定西市":[104.62,35.58],"陇南市":[104.92,33.38],"临夏回族自治州":[103.21,35.59],"甘南藏族自治州":[102.91,34.98]},

            "香港":{"香港特别行政区":[114.17,22.28]},
            "澳门":{"澳门特别行政区":[113.54,22.19]},
            "台湾":{"台北市":[121.50,25.04],"新北市":[121.46,25.01],"桃园市":[121.30,24.99],"台中市":[120.67,24.14],"台南市":[120.20,22.99],"高雄市":[120.31,22.62],"基隆市":[121.74,25.12],"新竹市":[120.96,24.81],"嘉义市":[120.44,23.47],"新竹县":[121.01,24.82],"苗栗县":[120.81,24.56],"彰化县":[120.54,24.07],"南投县":[120.68,23.90],"云林县":[120.52,23.70],"嘉义县":[120.29,23.45],"屏东县":[120.48,22.66],"宜兰县":[121.75,24.75],"花莲县":[121.60,23.97],"台东县":[121.14,22.75],"澎湖县":[119.56,23.56],"金门县":[118.31,24.43],"连江县":[119.95,26.15]}
        };

        const sortedProvinces = Object.keys(cityData).sort((a, b) => a.localeCompare(b, 'zh-CN-u-co-pinyin'));
        let currentMode = 'province';
        let visitedProvinces = JSON.parse(localStorage.getItem('visitedProvinces')) || [];
        let visitedCities = JSON.parse(localStorage.getItem('visitedCities')) || [];
        let openProvinceList = new Set();

        function saveData() {
            localStorage.setItem('visitedProvinces', JSON.stringify(visitedProvinces));
            localStorage.setItem('visitedCities', JSON.stringify(visitedCities));
        }

        setTimeout(() => {
            const splash = document.getElementById('splash');
            splash.style.opacity = '0';
            setTimeout(() => splash.style.display = 'none', 800);
        }, 2000);

        const myChart = echarts.init(document.getElementById('map-container'));
        
        function updateMap() {
            let series = [];
            
            let baseMapData = [];
            if (currentMode === 'province') {
                baseMapData = visitedProvinces.map(name => ({ name: name, value: 1 }));
            } else {
                const litProvincesInCityMode = new Set();
                visitedCities.forEach(city => {
                    for (let prov in cityData) {
                        if (cityData[prov][city]) litProvincesInCityMode.add(prov);
                    }
                });
                baseMapData = Array.from(litProvincesInCityMode).map(name => ({ name: name, value: 1 }));
            }

            // 省份层
            series.push({
                type: 'map', map: 'china', geoIndex: 0, data: baseMapData,
                itemStyle: { 
                    // 【修正】更明显的白色半透明边界线
                    borderColor: 'rgba(255, 255, 255, 0.6)', 
                    borderWidth: 2,
                    areaColor: '#0b285f' 
                }
            });

            // 城市层
            if (currentMode === 'city') {
                let scatterData = visitedCities.map(city => {
                    for (let prov in cityData) {
                        if (cityData[prov][city]) return { name: city, value: [...cityData[prov][city], 1] };
                    }
                    return null;
                }).filter(item => item !== null);

                // 【修正】呼吸灯确认为纯白，完全与省份颜色不同
                series.push({
                    type: 'effectScatter',
                    coordinateSystem: 'geo',
                    data: scatterData,
                    symbolSize: 10,
                    showEffectOn: 'render',
                    rippleEffect: { brushType: 'stroke', scale: 3.5 },
                    itemStyle: { color: '#ffffff', shadowBlur: 10, shadowColor: '#ffffff' } 
                });
            }

            myChart.setOption({
                tooltip: { 
                    trigger: 'item', formatter: params => params.name ? params.name : '',
                    backgroundColor: 'rgba(0,0,0,0.7)', textStyle: { color: '#fff' }
                },
                // 【修正】给 visualMap 添加 seriesIndex，确保不影响纯白色的散点图层！
                visualMap: { show: false, min: 0, max: 1, inRange: { color: ['#0b285f', '#4c7fe9'] }, seriesIndex: [0] }, 
                geo: { 
                    map: 'china', roam: true, zoom: 1.2,
                    label: { show: false }, 
                    emphasis: { label: { show: false }, itemStyle: { areaColor: '#1e3a8a' } },
                    itemStyle: { 
                        areaColor: '#0c2760', 
                        borderColor: 'rgba(255, 255, 255, 0.6)', 
                        borderWidth: 2 
                    }
                }, 
                series: series
            }, true);

            updateUI();
        }

        function updateUI() {
            const statsNum = document.getElementById('statsNumber');
            const statsTotal = document.getElementById('statsTotal');
            const statsDesc = document.querySelector('#statsDesc span:first-child');
            const statsPercent = document.getElementById('statsPercent');
            const starText = document.getElementById('starBtnText');
            const drawerTitle = document.getElementById('drawerTitle');

            if (currentMode === 'province') {
                let total = 34;
                let count = visitedProvinces.length;
                statsNum.innerText = count;
                statsTotal.style.display = 'inline';
                statsTotal.innerText = `/ ${total}`;
                statsPercent.style.display = 'inline';
                statsPercent.innerText = ((count/total)*100).toFixed(1) + '%';
                statsDesc.innerText = '已点亮省份';
                starText.innerText = '点亮省份';
                drawerTitle.innerText = '选择省份';
            } else {
                let count = visitedCities.length;
                statsNum.innerText = count;
                statsTotal.style.display = 'none';
                statsPercent.style.display = 'none';
                statsDesc.innerText = '已点亮城市';
                starText.innerText = '点亮城市';
                drawerTitle.innerText = '选择城市';
            }
        }

        function renderList(filterText = '') {
            const listContainer = document.getElementById('locationList');
            listContainer.innerHTML = '';

            sortedProvinces.forEach(prov => {
                let citiesInProv = Object.keys(cityData[prov]).sort((a, b) => a.localeCompare(b, 'zh-CN-u-co-pinyin'));
                
                if (currentMode === 'province') {
                    if (prov.includes(filterText) || filterText === '') {
                        const isVisited = visitedProvinces.includes(prov);
                        listContainer.innerHTML += `
                            <div class="list-item" style="display:flex; justify-content:space-between; align-items:center; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.1);">
                                <span class="list-item-title">${prov}</span>
                                <span class="star-btn ${isVisited ? 'active' : ''}" onclick="toggleVisit('${prov}', 'province', event)">⭐</span>
                            </div>`;
                    }
                } 
                else {
                    let matchCities = citiesInProv.filter(c => c.includes(filterText) || prov.includes(filterText) || filterText === '');
                    
                    if (matchCities.length > 0) {
                        let cityHtml = matchCities.map(city => {
                            const isVisited = visitedCities.includes(city);
                            return `
                            <div class="city-item">
                                <span class="city-item-title">${city}</span>
                                <span class="star-btn ${isVisited ? 'active' : ''}" onclick="toggleVisit('${city}', 'city', event)">⭐</span>
                            </div>`;
                        }).join('');

                        let isOpen = openProvinceList.has(prov) ? 'open' : '';

                        listContainer.innerHTML += `
                            <div class="province-group">
                                <div class="province-header ${isOpen}" onclick="toggleProvince(this, '${prov}')">
                                    <div style="flex:1; display:flex; align-items:center;">
                                        <span class="prov-title" style="font-weight:bold; color:#fff;">${prov}</span>
                                        <span style="font-size:12px; color:#aaa; margin-left:10px;">${matchCities.length} 个城市</span>
                                    </div>
                                    <span class="toggle-arrow ${isOpen}">▶</span>
                                </div>
                                <div class="city-list ${isOpen}">
                                    ${cityHtml}
                                </div>
                            </div>`;
                    }
                }
            });
        }

        function toggleProvince(element, provName) {
            element.classList.toggle('open');
            element.querySelector('.toggle-arrow').classList.toggle('open');
            element.nextElementSibling.classList.toggle('open');
            if(element.classList.contains('open')) { openProvinceList.add(provName); } else { openProvinceList.delete(provName); }
        }

        function toggleVisit(name, type, event) {
            if (event) event.stopPropagation();
            let targetArray = type === 'province' ? visitedProvinces : visitedCities;
            const index = targetArray.indexOf(name);
            if (index > -1) {
                targetArray.splice(index, 1);
                if(event) event.currentTarget.classList.remove('active');
            } else {
                targetArray.push(name);
                // 【修正】文案更改
                showToast(`点亮 ⭐ ${name}`);
                if(event) event.currentTarget.classList.add('active');
            }
            saveData();
            updateMap(); 
            if(!event && document.getElementById('list-drawer').style.bottom === '0px') {
                renderList(document.getElementById('searchInput').value);
            }
        }

        myChart.on('click', params => {
            if (currentMode === 'province' && params.componentType === 'series' && params.name && cityData[params.name]) {
                toggleVisit(params.name, 'province', null);
            }
        });

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg; toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 2000);
        }

        function openDrawer() { document.getElementById('list-drawer').style.bottom = '0'; renderList(); }
        function closeDrawer() { document.getElementById('list-drawer').style.bottom = '-100%'; document.getElementById('searchInput').value = ''; }
        function resetMap() { myChart.dispatchAction({ type: 'restore' }); }

        document.getElementById('modeToggle').addEventListener('click', function() {
            currentMode = currentMode === 'province' ? 'city' : 'province';
            this.innerText = currentMode === 'province' ? '切换至城市' : '切换至省份';
            closeDrawer();
            updateMap();
        });

        document.getElementById('searchInput').addEventListener('input', e => renderList(e.target.value));
        window.addEventListener('resize', () => myChart.resize());

        updateMap();

        // 【修正】更安全的截图分享逻辑
        function generatePoster() {
            const app = document.getElementById('app');
            const header = app.querySelector('header');
            const stats = document.getElementById('mainStats');
            const actions = document.getElementById('mainActions');
            
            // 截图前物理隐藏
            header.style.display = 'none';
            stats.style.display = 'none';
            actions.style.display = 'none';
            closeDrawer(); 
            
            let total = 34;
            let visitedCount = currentMode === 'province' ? visitedProvinces.length : visitedCities.length;
            let percent = ((visitedCount / total) * 100).toFixed(1);

            let statsHtml = `
                <div style="font-size:12px; color:#eee; margin-bottom:5px;">我已点亮</div>
                <div style="font-size:32px; font-weight:900; color:#fff; margin-bottom:10px;">${visitedCount} <span style="font-size:16px;">个${currentMode === 'province' ? '省份' : '城市'}</span></div>
            `;
            if (currentMode === 'province') {
                statsHtml += `<div style="font-size:12px; color:#4c7fe9; font-weight:bold;">拥抱星球进度 ${percent}%</div>`;
            }

            const posterStatsDiv = document.createElement('div');
            posterStatsDiv.id = 'temp-poster-stats';
            posterStatsDiv.style.cssText = 'position:absolute; bottom:20px; left:20px; text-align:left; color:#fff; z-index:5; background:rgba(0,0,0,0.6); padding:15px; border-radius:12px; backdrop-filter:blur(5px); border: 1px solid rgba(255,255,255,0.1); display:inline-block;';
            posterStatsDiv.innerHTML = `
                ${statsHtml}
                <div style="display:flex; align-items:center; margin-top:15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top:10px;">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=https://example.com" style="width:40px; height:40px; background:#fff; padding:3px; border-radius:5px; flex-shrink:0;">
                    <span style="margin-left: 10px; font-size:10px; color:#ccc; line-height:1.4; white-space:nowrap;">扫码加入足迹星球<br>give the world a hug!</span>
                </div>
            `;
            app.appendChild(posterStatsDiv);
            
            myChart.setOption({animation: false});

            // 预留更长时间给浏览器渲染
            setTimeout(() => {
                html2canvas(app, { backgroundColor: '#000', useCORS: true }).then(canvas => {
                    const posterContent = document.getElementById('poster-content');
                    posterContent.innerHTML = `<img src="${canvas.toDataURL('image/png')}" style="width: 100%; display:block;">`;
                    
                    // 恢复
                    document.getElementById('temp-poster-stats').remove();
                    header.style.display = 'flex';
                    stats.style.display = 'block';
                    actions.style.display = 'flex';
                    
                    myChart.setOption({animation: true});
                    document.getElementById('poster').style.display = 'flex';
                }).catch(err => {
                    // 容错机制：如果截图失败，确保UI能恢复
                    console.error(err);
                    document.getElementById('temp-poster-stats').remove();
                    header.style.display = 'flex';
                    stats.style.display = 'block';
                    actions.style.display = 'flex';
                    myChart.setOption({animation: true});
                    showToast('生成分享海报失败，请重试');
                });
            }, 500); 
        }

        function closePoster() { document.getElementById('poster').style.display = 'none'; }
    </script>
